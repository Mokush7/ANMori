<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANMORI — Маркетинг через смысл</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230C0C0C'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='11' fill='%23B0C4DE'%3EAN%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0C0C;
  --white: #FFFFFF;
  --gray: #888888;
  --border: rgba(255,255,255,0.08);
  --card-bg: #161616;
  --card-border: rgba(255,255,255,0.07);
  --yellow: #B0C4DE;
  --yellow-hover: #9aafc5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--white);
  overflow-x: hidden;
  width: 100%;
  cursor: none;
}

.cursor {
  width: 10px; height: 10px;
  background: var(--white); border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: difference;
}
.cursor-follower {
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.35); border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 9998;
  mix-blend-mode: difference;
}

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 48px;
  border-bottom: 1px solid var(--border);
  background: rgba(12,12,12,0.92);
  backdrop-filter: blur(24px);
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px; letter-spacing: 3px; color: var(--white);
  text-decoration: none;
}
nav { display: flex; gap: 36px; align-items: center; }
nav a {
  font-size: 13px; color: var(--gray);
  text-decoration: none; font-weight: 500;
  transition: color .2s;
}
nav a:hover { color: var(--white); }
.btn-contact {
  background: var(--white); color: var(--bg);
  padding: 10px 24px; border-radius: 50px;
  font-size: 13px; font-weight: 700;
  text-decoration: none; transition: all .2s;
}
.btn-contact:hover { background: var(--yellow); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 140px 48px 80px;
  position: relative; overflow: hidden;
}
.hero-orb {
  position: absolute; border-radius: 50%;
  filter: blur(100px); pointer-events: none;
}
.orb1 { width: 500px; height: 500px; background: rgba(255,255,255,0.06); top: -80px; right: 80px; }
.orb2 { width: 300px; height: 300px; background: rgba(176,196,222,0.1); bottom: 80px; left: -80px; }

.hero-eyebrow {
  font-size: 11px; letter-spacing: 3px; color: var(--gray);
  text-transform: uppercase; margin-bottom: 24px; font-weight: 600;
  position: relative; z-index: 2;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 11vw, 156px);
  line-height: 0.88; letter-spacing: -0.5px;
  position: relative; z-index: 2; margin-bottom: 48px;
  /* FIXES FOR OVERFLOW */
  word-wrap: break-word;
  overflow-wrap: break-word;
  hyphens: auto;
}
.hero-title .line { display: block; }
.hero-title .indent { padding-left: clamp(16px, 12vw, 180px); }
.hero-title .right { text-align: right; }

.hero-bottom {
  display: flex; justify-content: space-between; align-items: flex-end;
  border-top: 1px solid var(--border); padding-top: 32px;
  position: relative; z-index: 2;
}
.hero-desc { max-width: 360px; font-size: 14px; color: var(--gray); line-height: 1.8; }
.hero-desc strong { color: var(--white); display: block; margin-bottom: 6px; font-size: 15px; }

.hero-cta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }

.btn-pill {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--white); color: var(--bg);
  padding: 14px 28px; border-radius: 50px;
  font-size: 13px; font-weight: 700; text-decoration: none;
  transition: all .25s; white-space: nowrap;
}
.btn-pill:hover { background: var(--yellow); transform: scale(1.03); }
.btn-pill .ico {
  width: 26px; height: 26px; background: var(--bg); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--white);
}

/* RESPONSIVE MEDIA QUERIES */
@media(max-width:900px){
  header{padding:16px 24px;} nav{display:none;}
  .hero{padding:100px 24px 60px;}
  .hero-bottom{flex-direction:column;gap:24px;align-items:flex-start;}
  .hero-title .indent { padding-left: 0; } /* Убираем отступ на средних экранах */
  .hero-title .right { text-align: left; }
}

@media(max-width:600px){
  /* ГЛАВНОЕ ИСПРАВЛЕНИЕ ЗАГОЛОВКОВ */
  .hero-title { 
    font-size: clamp(48px, 15vw, 80px); 
    line-height: 0.95;
    letter-spacing: -1px;
  }
  .hero-title .indent { padding-left: 0 !important; }
  .hero-title .right { text-align: left !important; }
  
  .hero-desc { font-size: 13px; }
  .hero-cta { flex-direction: column; width: 100%; }
  .btn-pill { width: 100%; justify-content: center; }

  /* Исправление переполнения во всех секциях */
  h1, h2, .big-title, .sp-title {
    word-wrap: break-word;
    overflow-wrap: break-word;
    hyphens: auto;
    font-size: clamp(32px, 12vw, 54px) !important;
  }
}

/* Остальные базовые стили (сокращено для краткости) */
.rv { opacity: 0; transform: translateY(28px); transition: 0.7s ease; }
.rv.in { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="cursor-follower" id="cuf"></div>

<header>
  <a href="#" class="logo">ANMORI</a>
  <nav>
    <a href="#about">О нас</a>
    <a href="#services">Услуги</a>
    <a href="#cases">Кейсы</a>
  </nav>
  <a href="#form" class="btn-contact">Связаться →</a>
</header>

<section class="hero">
  <div class="hero-orb orb1"></div>
  <div class="hero-orb orb2"></div>
  <div class="hero-eyebrow">Маркетинговое агентство · Системный рост</div>
  <h1 class="hero-title">
    <span class="line">МАРКЕТИНГ</span>
    <span class="line indent">ЧЕРЕЗ</span>
    <span class="line right">СМЫСЛ.</span>
  </h1>
  <div class="hero-bottom">
    <p class="hero-desc">
      <strong>Растим ваши цифры системно</strong>
      Внедряем систему маркетинга, аналитики и контента для кратного роста выручки.
    </p>
    <div class="hero-cta">
      <a href="#form" class="btn-pill">Мини-аудит за 48ч <span class="ico">→</span></a>
    </div>
  </div>
</section>

<script>
  // Простая анимация появления при скролле
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('in');
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.rv').forEach(el => observer.observe(el));

  // Курсор (скрываем на мобилках)
  const cur = document.getElementById('cur');
  const cuf = document.getElementById('cuf');
  if (window.innerWidth > 1024) {
    window.addEventListener('mousemove', e => {
      cur.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
      cuf.style.transform = `translate(${e.clientX - 13}px, ${e.clientY - 13}px)`;
    });
  } else {
    cur.style.display = 'none';
    cuf.style.display = 'none';
    document.body.style.cursor = 'default';
  }
</script>

</body>
</html>
